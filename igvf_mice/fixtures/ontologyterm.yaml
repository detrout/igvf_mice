- fields:
    description: A specialized brain region of the ventral diencephalon arising near
      the end of the segmentation period; the embryonic hypothalamic region will give
      rise to the posterior pituitary gland as well as a number of brain nuclei. [ZFA].
      One of the most important functions of the hypothalamus is to link the nervous
      system to the endocrine system via the pituitary gland (hypophysis).[Wikipedia].
    name: Hypothalamus/Pituitary
  model: igvf_mice.ontologyterm
  pk: UBERON:0001898
- fields:
    description: The pituitary gland is an endocrine gland that secretes hormones
      that regulate many other glands [GO]. An endocrine gland located ventral to
      the diencephalon and derived from mixed neuroectodermal and non neuroectodermal
      origin [ZFIN].
    name: Hypothalamus/Pituitary
  model: igvf_mice.ontologyterm
  pk: UBERON:0000007
- fields:
    description: Part of the metencephalon that lies in the posterior cranial fossa
      behind the brain stem. It is concerned with the coordination of movement[MESH].
      A large dorsally projecting part of the brain concerned especially with the
      coordination of muscles and the maintenance of bodily equilibrium, situated
      between the brain stem and the back of the cerebrum , and formed in humans of
      two lateral lobes and a median lobe[BTO]. Brain structure derived from the anterior
      hindbrain, and perhaps including posterior midbrain. The cerebellum plays a
      role in somatic motor function, the control of muscle tone, and balance[ZFA].
    name: Cerebellum
  model: igvf_mice.ontologyterm
